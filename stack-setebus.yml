version: "3.7"

services:

## --------------------------- MEUBUSAPP --------------------------- ##

  setebus_api:
    image: setebus-api:latest   ## construa a imagem na VPS antes (veja SETUP_BACKEND.md)

    networks:
      - sevenbotsnetwork        ## mesma rede do postgres e do traefik

    environment:
    ## 🗄️ Banco de dados (conexão interna — porta 5432 fica FECHADA pra internet)
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=setebus
      - DB_USER=postgres
      - DB_PASSWORD=COLE_A_SENHA_DO_POSTGRES_AQUI
      - DB_SSL=false

    ## 🔐 Segurança — TROQUE estes dois valores!
      - JWT_SECRET=TROQUE_POR_STRING_ALEATORIA_LONGA
      - ADMIN_PASSWORD=TROQUE_POR_SUA_SENHA_ADMIN

    ## ⚙️ Servidor
      - NODE_ENV=production
      - PORT=3001
      - TZ=America/Sao_Paulo

    volumes:
      - setebus_uploads:/app/server/uploads   ## imagens dos anúncios persistem

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
      labels:
        - traefik.enable=1
        - traefik.http.routers.setebus.rule=Host(`meubusapp.com.br`) || Host(`www.meubusapp.com.br`)
        - traefik.http.routers.setebus.entrypoints=websecure
        - traefik.http.routers.setebus.priority=1
        - traefik.http.routers.setebus.tls.certresolver=letsencryptresolver
        - traefik.http.routers.setebus.service=setebus
        - traefik.http.services.setebus.loadbalancer.server.port=3001
        - traefik.http.services.setebus.loadbalancer.passHostHeader=true

## --------------------------- MEUBUSAPP --------------------------- ##

volumes:
  setebus_uploads:
    external: true
    name: setebus_uploads

networks:
  sevenbotsnetwork:
    external: true
    name: sevenbotsnetwork
